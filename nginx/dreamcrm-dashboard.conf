# DREAMCRM Availability Dashboard — nginx config
#
# Install:
#   sudo cp nginx/dreamcrm-dashboard.conf /etc/nginx/sites-available/dreamcrm
#   sudo ln -s /etc/nginx/sites-available/dreamcrm /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# The root path below must match where you cloned the project.
# Change /srv/dreamcrm-tests to your actual project directory.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;                         # responds to any domain or IP

    # Static files are served from reports/ — cron regenerates them in place
    root /srv/dreamcrm-tests/reports;
    index availability.html;

    # ---------------------------------------------------------------
    # Tab 1 — Availability dashboard (default landing page)
    # ---------------------------------------------------------------
    location = / {
        try_files /availability.html =404;
    }

    # ---------------------------------------------------------------
    # Tab 2 — API coverage / observation report
    # ---------------------------------------------------------------
    location = /coverage {
        return 301 /index.html;
    }

    # All HTML reports + CSV/JSON artifacts exposed under /
    location / {
        try_files $uri =404;

        # No browser cache for HTML — reports are regenerated frequently
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ---------------------------------------------------------------
    # Security — block access to everything outside reports/
    # ---------------------------------------------------------------
    location ~ /\.(env|git|venv|codex) {
        deny all;
        return 404;
    }

    # Deny direct access to source and secret directories
    location ~* ^/(scripts|tests|utils|configs|fixtures|OpenApi|artifacts|logs|\.venv)/ {
        deny all;
        return 404;
    }

    # ---------------------------------------------------------------
    # Optional: enable basic auth to protect the dashboard
    # Uncomment and create the password file first:
    #   sudo apt install apache2-utils
    #   sudo htpasswd -c /etc/nginx/.htpasswd admin
    # ---------------------------------------------------------------
    # auth_basic "DREAMCRM Dashboard";
    # auth_basic_user_file /etc/nginx/.htpasswd;
}


